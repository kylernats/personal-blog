{{ define "main" }}
<style>
    .command-center {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 40px;
        margin-top: 30px;
        color: var(--content); /* Adapts to PaperMod dark/light mode */
    }
    .left-panel { flex: 1; }
    .right-panel { flex: 1.5; }
    
    .ua-blue { color: #001C48; }
    .ua-red { color: #AB0520 !important; font-weight: bold; text-decoration: none; }
    .ua-red:hover { text-decoration: underline; }

    .stack-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin: 20px 0 30px 0;
        background: rgba(255, 255, 255, 0.05); /* Subtle contrast */
        padding: 20px;
        border-radius: 12px;
        border: 1px solid rgba(128, 128, 128, 0.2);
    }
    .stack-item { text-align: center; }
    .stack-item img { width: 35px; height: 35px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .stack-item p { font-size: 11px; margin-top: 8px; color: var(--secondary); }

    .research-card {
        padding: 20px;
        border-left: 5px solid #AB0520;
        border-radius: 8px;
        background: var(--tertiary);
        transition: transform 0.2s ease;
        text-decoration: none !important;
        display: block;
    }
    .research-card:hover { transform: translateX(5px); }
</style>

<div class="command-center">
  <div class="left-panel">
    <h1 style="font-size: 3rem; margin-bottom: 0;">Kyler Nats</h1>
    <p style="font-size: 1.2rem; color: var(--secondary);">MS in MIS Student @ The University of Arizona</p>
    
    <div style="margin: 15px 0 25px 0;">
        <a href="https://linkedin.com/in/kyler-nats" class="ua-red">LinkedIn</a> 
        <span style="color: var(--secondary);"> | </span>
        <a href="https://github.com/kylernats" class="ua-red">GitHub</a>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 25px;">
    
    <h3 style="margin-bottom: 15px;">Security Stack</h3>
    <div class="stack-grid">
        <div class="stack-item">
            <img src="https://cdn.worldvectorlogo.com/logos/splunk.svg" alt="Splunk">
            <p>Splunk</p>
        </div>
        <div class="stack-item">
            <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/terraform/terraform-original.svg" alt="Terraform">
            <p>Terraform</p>
        </div>
        <div class="stack-item">
            <img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/docker/docker-original.svg" alt="Docker">
            <p>Docker</p>
        </div>
        <div class="stack-item">
            <img src="https://cdn.worldvectorlogo.com/logos/aws-2.svg" alt="AWS">
            <p>AWS</p>
        </div>
    </div>

    <h3 style="margin-bottom: 15px;">Latest Research</h3>
    <a href="/personal-blog/blog/cmmc-framework/" class="research-card">
      <h4 style="margin: 0; color: var(--primary);">Decoding the CMMC 2.0 Framework →</h4>
      <p style="font-size: 0.9rem; color: var(--secondary); margin-top: 10px;">Exploring federal cybersecurity mandates and supply chain risk.</p>
    </a>
  </div>

  <div class="right-panel">
    <div style="border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
        <object 
            data="/personal-blog/uploads/Kyler_Nats_Resume.pdf" 
            type="application/pdf" 
            width="100%" 
            height="850px">
            <p>Your browser doesn't support PDFs. <a href="/personal-blog/uploads/Kyler_Nats_Resume.pdf">Download Resume.</a></p>
        </object>
    </div>
  </div>
</div>
{{ end }}
