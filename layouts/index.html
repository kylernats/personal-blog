{{ define "main" }}
<style>
    .command-center {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        margin-top: 20px;
        width: 100%;
    }
    /* Left side is now smaller to allow the resume to expand */
    .left-panel { flex: 0.8; } 
    
    /* Right side is now much wider */
    .right-panel { flex: 3; } 

    .social-icons {
        display: flex;
        gap: 15px;
        margin: 10px 0 25px 0;
    }
    .social-icons img {
        width: 24px;
        height: 24px;
        filter: brightness(var(--primary-brightness)); /* Adapts to dark/light mode */
    }

    .research-card {
        padding: 15px;
        border-left: 4px solid #AB0520;
        border-radius: 6px;
        background: var(--tertiary);
        text-decoration: none !important;
        display: block;
        transition: transform 0.2s ease;
    }
    .research-card:hover { transform: translateX(5px); }
</style>

<div class="command-center">
  <div class="left-panel">
    <h1 style="font-size: 2.2rem; margin-bottom: 0;">Kyler Nats</h1>
    <p style="font-size: 1rem; color: var(--secondary); margin-bottom: 10px;">MS in MIS Student @ The University of Arizona</p>
    
    <div class="social-icons">
        <a href="https://linkedin.com/in/kylergenualdi" target="_blank">
            <img src="https://cdn.worldvectorlogo.com/logos/linkedin-icon-2.svg" alt="LinkedIn">
        </a>
        <a href="https://github.com/kylernats" target="_blank">
            <img src="https://cdn.worldvectorlogo.com/logos/github-icon-1.svg" alt="GitHub">
        </a>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 20px;">
    
    <h3 style="font-size: 1.1rem; margin-bottom: 12px;">Latest Research</h3>
    <a href="/personal-blog/blog/cmmc-framework/" class="research-card">
      <h4 style="margin: 0; font-size: 1rem; color: var(--primary);">CMMC 2.0 Framework →</h4>
      <p style="font-size: 0.8rem; color: var(--secondary); margin-top: 8px;">Exploring federal cybersecurity mandates and supply chain risk.</p>
    </a>
  </div>

  <div class="right-panel">
    <div style="border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
        <object 
            data="/personal-blog/uploads/Kyler_Nats_Resume.pdf" 
            type="application/pdf" 
            width="100%" 
            height="900px">
            <p>Your browser doesn't support PDFs. <a href="/personal-blog/uploads/Kyler_Nats_Resume.pdf">Download Resume.</a></p>
        </object>
    </div>
  </div>
</div>
{{ end }}
