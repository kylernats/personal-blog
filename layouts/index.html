{{ define "main" }}
<style>
    .command-center {
        display: grid;
        grid-template-columns: 1fr 1.2fr; /* Slightly widened right side to let resume scale up */
        gap: 60px;
        margin-top: 40px;
        align-items: flex-start;
    }
    
    /* Header Section */
    .header-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0px;
    }

    .name-title h1 {
        font-size: 3rem;
        margin: 0;
        line-height: 1;
        letter-spacing: -1.5px;
        color: var(--primary);
    }

    .social-icons {
        display: flex;
        gap: 15px;
    }
    .social-icons img {
        width: 26px;
        height: 26px;
        transition: transform 0.2s ease;
    }
    .social-icons img:hover { transform: scale(1.1); }
    
    .gh-icon { filter: invert(var(--theme-invert, 1)); }

    .sub-title {
        font-size: 1.15rem;
        color: var(--secondary);
        margin: 15px 0 0 0;
    }

    .research-card {
        padding: 22px;
        border-left: 6px solid #AB0520;
        border-radius: 8px;
        background: var(--tertiary);
        text-decoration: none !important;
        display: block;
        margin-top: 30px;
    }

    /* RIGHT SIDE: Scaled Resume Frame */
    .resume-frame {
        width: 100%;
        height: 840px; /* Increased to fill the bottom blank space and allow horizontal widening */
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        pointer-events: none; /* Prevents inner scrolling */
    }

    object { width: 100%; height: 100%; display: block; }
</style>

<div class="command-center">
  <div class="left-panel">
    <div class="header-group">
        <div class="name-title">
            <h1>Kyler Nats</h1>
        </div>
        <div class="social-icons">
            <a href="https://linkedin.com/in/kylergenualdi" target="_blank">
                <img src="https://cdn.worldvectorlogo.com/logos/linkedin-icon-2.svg" alt="LinkedIn">
            </a>
            <a href="https://github.com/kylernats" target="_blank">
                <img class="gh-icon" src="https://cdn.worldvectorlogo.com/logos/github-icon-1.svg" alt="GitHub">
            </a>
        </div>
    </div>
    
    <p class="sub-title">MS in MIS Student @ The University of Arizona</p>

    <hr style="border: 0; border-top: 2px solid var(--border); margin: 30px 0;">
    
    <h3 style="font-size: 1.4rem; margin-bottom: 15px;">Latest Research</h3>
    <a href="/personal-blog/blog/cmmc-framework/" class="research-card">
      <h4 style="margin: 0; color: var(--primary); font-size: 1.2rem;">CMMC 2.0 Framework Deep Dive →</h4>
      <p style="font-size: 0.9rem; color: var(--secondary); margin-top: 12px;">Analyzing federal cybersecurity mandates and Department of Defense supply chain risk management.</p>
    </a>
  </div>

  <div class="right-panel">
    <div class="resume-frame">
        <object 
            data="/personal-blog/uploads/Kyler_Nats_Resume.pdf#toolbar=0&navpanes=0&view=FitH" 
            type="application/pdf">
        </object>
    </div>
    <p style="text-align: center; margin-top: 20px;">
        <a href="/personal-blog/uploads/Kyler_Nats_Resume.pdf" target="_blank" style="color: #AB0520; font-weight: bold; text-decoration: none; font-size: 1rem;">
            Open Full Resume &rarr;
        </a>
    </p>
  </div>
</div>
{{ end }}
