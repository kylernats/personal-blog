{{ define "main" }}
<style>
    .hero-container {
        display: flex;
        align-items: center;
        gap: 50px;
        padding: 60px 0;
        border-bottom: 1px solid var(--border);
    }
    
    .headshot {
        width: 180px;
        height: 180px;
        border-radius: 12px;
        object-fit: cover;
        border: 2px solid #AB0520;
    }

    .hero-text h1 { font-size: 3.5rem; margin: 0; color: var(--primary); letter-spacing: -1.5px; }
    .hero-text p { font-size: 1.2rem; color: var(--secondary); margin-top: 5px; }

    .social-links { display: flex; gap: 15px; margin-top: 20px; }
    .social-links a img { width: 26px; }
    .gh-icon { filter: invert(var(--theme-invert, 1)); }

    .video-section {
        margin-top: 50px;
        max-width: 900px; /* Centers the content better */
    }

    .video-wrapper {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        border-radius: 12px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .video-wrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }
</style>

<div class="hero-container">
    <img src="/img/headshot.jpg" alt="Kyler Nats" class="headshot">
    <div class="hero-text">
        <h1>Kyler Nats</h1>
        <p>Master of Science in MIS @ University of Arizona</p>
        <div class="social-links">
            <a href="https://linkedin.com/in/kyler-nats/" target="_blank">
                <img src="https://cdn.worldvectorlogo.com/logos/linkedin-icon-2.svg" alt="LinkedIn">
            </a>
            <a href="https://github.com/kylernats" target="_blank">
                <img class="gh-icon" src="https://cdn.worldvectorlogo.com/logos/github-icon-1.svg" alt="GitHub">
            </a>
        </div>
    </div>
</div>

<div class="video-section">
    <h3 style="margin-bottom: 20px; font-size: 1.2rem; color: var(--primary);">Security Breakdown: Chrome Password Security</h3>
    <div class="video-wrapper">
        <iframe src="https://www.youtube.com/embed/Gy2bAcMD3bs" allowfullscreen></iframe>
    </div>
    <p style="margin-top: 20px; line-height: 1.6; color: var(--secondary);">
        Technical demonstration of credential access vulnerabilities and mitigation strategies.
    </p>
</div>
{{ end }}
