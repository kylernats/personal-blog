{{ define "main" }}
<style>
    .command-center {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 60px;
        margin-top: 50px;
        align-items: flex-start;
    }
    
    /* Refined Header Section */
    .header-group {
        display: flex;
        justify-content: space-between;
        align-items: center; /* Aligns icons vertically with the bottom of your name */
        margin-bottom: 5px;
    }

    .name-title h1 {
        font-size: 2.8rem;
        margin: 0;
        line-height: 1;
        letter-spacing: -1px;
    }

    .social-icons {
        display: flex;
        gap: 12px;
    }
    .social-icons img {
        width: 24px;
        height: 24px;
        opacity: 0.8;
        transition: opacity 0.2s ease;
    }
    .social-icons img:hover { opacity: 1; }
    
    .gh-icon { filter: invert(var(--theme-invert, 1)); }

    .sub-title {
        font-size: 1.1rem;
        color: var(--secondary);
        margin: 10px 0 0 0;
        font-weight: 400;
    }

    .research-card {
        padding: 20px;
        border-left: 5px solid #AB0520;
        border-radius: 8px;
        background: var(--tertiary);
        text-decoration: none !important;
        display: block;
        margin-top: 25px;
    }

    /* Resume Snapshot Fix */
    .resume-snapshot {
        width: 100%;
        height: 580px; /* Adjusted to perfectly match the left side content height */
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        pointer-events: none;
    }
    object { width: 100%; height: 100%; display: block; }
</style>

<div class="command-center">
  <div class="left-panel">
    <div class="header-group">
        <div class="name-title">
            <h1>Kyler Nats</h1>
        </div>
        <div class="social-icons">
            <a href="https://linkedin.com/in/kyler-nats/" target="_blank">
                <img src="https://cdn.worldvectorlogo.com/logos/linkedin-icon-2.svg" alt="LinkedIn">
            </a>
            <a href="https://github.com/kylernats" target="_blank">
                <img class="gh-icon" src="https://cdn.worldvectorlogo.com/logos/github-icon-1.svg" alt="GitHub">
            </a>
        </div>
    </div>
    
    <p class="sub-title">MS in MIS Student @ The University of Arizona</p>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 25px 0;">
    
    <h3 style="font-size: 1.3rem; margin-bottom: 15px;">Latest Research</h3>
    <a href="/personal-blog/blog/cmmc-framework/" class="research-card">
      <h4 style="margin: 0; color: var(--primary); font-size: 1.1rem;">CMMC 2.0 Framework Deep Dive →</h4>
      <p style="font-size: 0.85rem; color: var(--secondary); margin-top: 10px;">Analyzing federal cybersecurity mandates and Department of Defense supply chain risk management.</p>
    </a>
  </div>

  <div class="right-panel">
    <div class="resume-snapshot">
        <object 
            data="/personal-blog/uploads/Kyler_Nats_Resume.pdf#toolbar=0&navpanes=0&view=FitH" 
            type="application/pdf">
        </object>
    </div>
    <p style="text-align: center; margin-top: 15px;">
        <a href="/personal-blog/uploads/Kyler_Nats_Resume.pdf" target="_blank" style="color: #AB0520; font-weight: bold; text-decoration: none; font-size: 0.9rem;">
            Open Full Resume &rarr;
        </a>
    </p>
  </div>
</div>
{{ end }}
