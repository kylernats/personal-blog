{{ define "main" }}
<style>
    /* 70/30 Grid to give the Resume maximum width */
    .command-center {
        display: grid;
        grid-template-columns: 28% 70%; 
        gap: 2%;
        margin-top: 10px;
        width: 100%;
        align-items: start;
    }
    
    .left-panel { padding-right: 10px; }

    .social-icons {
        display: flex;
        gap: 15px;
        margin: 10px 0 20px 0;
    }
    .social-icons img { width: 28px; height: 28px; }
    
    /* Ensures GitHub is visible on dark backgrounds */
    .gh-icon { filter: invert(var(--theme-invert, 0.8)); }

    .research-card {
        padding: 15px;
        border-left: 4px solid #AB0520;
        border-radius: 6px;
        background: var(--tertiary);
        text-decoration: none !important;
        display: block;
    }

    /* RIGHT PANEL: Fixed-scale container */
    .resume-container {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        /* Matches the standard aspect ratio of a US Letter PDF to prevent "zoom out" space */
        height: calc(100vw * 0.7 * 1.29); 
        max-height: 1100px;
        background: #525659; /* Standard PDF viewer backdrop color */
    }

    object {
        display: block;
        width: 100%;
        height: 100%;
    }
</style>

<div class="command-center">
  <div class="left-panel">
    <h1 style="font-size: 2.5rem; margin-bottom: 0;">Kyler Nats</h1>
    <p style="font-size: 1rem; color: var(--secondary);">MS in MIS Student</p>
    <p style="font-size: 1rem; color: var(--secondary);">@ The University of Arizona</p>
    
    <div class="social-icons">
        <a href="https://linkedin.com/in/kylernats/" target="_blank">
            <img src="https://cdn.worldvectorlogo.com/logos/linkedin-icon-2.svg" alt="LinkedIn">
        </a>
        <a href="https://github.com/kylernats" target="_blank">
            <img class="gh-icon" src="https://cdn.worldvectorlogo.com/logos/github-icon-1.svg" alt="GitHub">
        </a>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 20px;">
    
    <h3 style="font-size: 1.2rem; margin-bottom: 15px;">Latest Research</h3>
    <a href="/personal-blog/blog/cmmc-framework/" class="research-card">
      <h4 style="margin: 0; font-size: 1rem; color: var(--primary);">CMMC 2.0 Framework →</h4>
      <p style="font-size: 0.8rem; color: var(--secondary); margin-top: 8px;">Exploring federal cybersecurity mandates and supply chain risk.</p>
    </a>
  </div>

  <div class="right-panel">
    <div class="resume-container">
        <object 
            data="/personal-blog/uploads/Kyler_Nats_Resume.pdf#view=FitH" 
            type="application/pdf">
            <p>Your browser doesn't support PDFs. <a href="/personal-blog/uploads/Kyler_Nats_Resume.pdf">Download Resume.</a></p>
        </object>
    </div>
  </div>
</div>
{{ end }}
