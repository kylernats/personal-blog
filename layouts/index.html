{{ define "main" }}
<style>
    /* Symmetrical 50/50 Grid within standard theme margins */
    .command-center {
        display: grid;
        grid-template-columns: 1fr 1.2fr; 
        gap: 60px;
        margin-top: 40px;
        width: 100%;
        align-items: start;
    }
    
    .left-panel { padding-top: 10px; }

    .social-icons {
        display: flex;
        gap: 20px;
        margin: 15px 0 30px 0;
    }
    .social-icons img { width: 30px; height: 30px; }
    
    /* Ensuring GitHub is visible and high-contrast */
    .gh-icon { filter: invert(var(--theme-invert, 1)); }

    .research-card {
        padding: 20px;
        border-left: 5px solid #AB0520;
        border-radius: 8px;
        background: var(--tertiary);
        text-decoration: none !important;
        display: block;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .research-card:hover { 
        transform: translateY(-3px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    /* Resume container that locks scaling and prevents inner scrolling */
    .resume-frame {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        pointer-events: none; /* Prevents the user from scrolling inside the PDF */
    }

    .resume-frame object {
        display: block;
        width: 100%;
        height: 850px; /* Fixed height to match page length */
    }
</style>

<div class="command-center">
  <div class="left-panel">
    <h1 style="font-size: 3.2rem; margin-bottom: 5px; color: var(--primary);">Kyler Nats</h1>
    <p style="font-size: 1.2rem; color: var(--secondary); margin-bottom: 5px;">MS in MIS Student</p>
    <p style="font-size: 1.2rem; color: var(--secondary);">@ The University of Arizona</p>
    
    <div class="social-icons">
        <a href="https://linkedin.com/in/kyler-nats/" target="_blank">
            <img src="https://cdn.worldvectorlogo.com/logos/linkedin-icon-2.svg" alt="LinkedIn">
        </a>
        <a href="https://github.com/kylernats" target="_blank">
            <img class="gh-icon" src="https://cdn.worldvectorlogo.com/logos/github-icon-1.svg" alt="GitHub">
        </a>
    </div>

    <hr style="border: 0; border-top: 2px solid var(--border); margin: 30px 0;">
    
    <h3 style="font-size: 1.4rem; margin-bottom: 20px;">Latest Research</h3>
    <a href="/personal-blog/blog/cmmc-framework/" class="research-card">
      <h4 style="margin: 0; font-size: 1.1rem; color: var(--primary);">CMMC 2.0 Framework Deep Dive →</h4>
      <p style="font-size: 0.9rem; color: var(--secondary); margin-top: 10px;">Analyzing federal cybersecurity mandates and Department of Defense supply chain risk management.</p>
    </a>
  </div>

  <div class="right-panel">
    <div class="resume-frame">
        <object 
            data="/personal-blog/uploads/Kyler_Nats_Resume.pdf#toolbar=0&navpanes=0&view=FitH" 
            type="application/pdf">
            <p>View <a href="/personal-blog/uploads/Kyler_Nats_Resume.pdf">Resume PDF</a></p>
        </object>
    </div>
  </div>
</div>
{{ end }}
